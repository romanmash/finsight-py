rateLimitPerUserPerMinute: 10
commandBehavior:
  allowFreeTextOperatorQuery: true
  enabledCommands:
    missions: true
    brief: true
    help: true
responseMessages:
  unauthorized: "⛔ Access denied."
  throttled: "⏱ Rate limit exceeded. Please wait."
  validationError: "⚠️ Invalid command. Use /help."
  temporaryUnavailable: "⚠️ Service temporarily unavailable. Please try again."
  internalFailure: "⚠️ Internal error. Please retry later."
  processingAck: "Processing your request... I'll reply when done."
  transcriptionUnavailable: "⚠️ Voice transcription unavailable, please resend as text."
  lowConfidence: "⚠️ Voice transcription confidence too low. Please clarify or send text."
delivery:
  messageMaxLength: 4096
  gracefulShutdownMs: 10000
  proactivePrimaryChatId: null
  pollTimeoutSeconds: 30
voice:
  transcriptionModel: "whisper-1"
  confidenceThreshold: 0.6
performance:
  acknowledgmentP95Ms: 3000
