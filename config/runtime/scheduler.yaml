pipelines:
  - name: investigation
    agent_sequence:
      - researcher
      - analyst
      - technician
      - bookkeeper
      - reporter
  - name: daily_brief
    agent_sequence:
      - researcher
      - analyst
      - reporter
    cron: "0 7 * * MON-FRI"
  - name: screener_scan
    agent_sequence:
      - researcher
      - watchdog
    cron: "0 6 * * MON-FRI"
  - name: watchdog_scan
    agent_sequence:
      - watchdog
    cron: "*/5 * * * *"
alert_poll_interval_seconds: 30
timezone: "Europe/Copenhagen"
