name: Secret Policy

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  no-hardcoded-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Enforce no hardcoded secrets
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import subprocess
          import sys
          from pathlib import Path

          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"ASIA[0-9A-Z]{16}"),
              re.compile(r"-----BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY-----"),
              re.compile(r"(?i)(api[_-]?key|token|secret)\s*[:=]\s*['\"][A-Za-z0-9_\-]{20,}['\"]"),
          ]

          exclude_dirs = {
              ".git",
              ".tmp",
              ".venv",
              "__pycache__",
          }
          exclude_files = {
              ".env",
              ".env.example",
          }

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failures: list[tuple[str, int, str]] = []

          for rel in tracked:
              p = Path(rel)
              if any(part in exclude_dirs for part in p.parts):
                  continue
              if p.name in exclude_files:
                  continue
              try:
                  data = p.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              except FileNotFoundError:
                  continue

              for idx, line in enumerate(data.splitlines(), start=1):
                  if "${{ secrets." in line:
                      continue
                  if any(rx.search(line) for rx in patterns):
                      failures.append((rel, idx, line.strip()))

          if failures:
              for rel, idx, line in failures:
                  print(f"{rel}:{idx}: potential hardcoded secret -> {line}")
              sys.exit(1)

          print("No potential hardcoded secrets found.")
          PY
