name: Secret Policy

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  no-hardcoded-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce no hardcoded secrets
        run: node scripts/check-no-hardcoded-secrets.mjs
