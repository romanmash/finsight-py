services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finsight"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  market-data-mcp:
    build:
      context: ./apps/mcp-servers/market-data
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  news-macro-mcp:
    build:
      context: ./apps/mcp-servers/news-macro
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  rag-retrieval-mcp:
    build:
      context: ./apps/mcp-servers/rag-retrieval
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-watchdog:
    build:
      context: ./apps/api-service
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "watchdog"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-brief:
    build:
      context: ./apps/api-service
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "brief"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

volumes:
  pgdata:
