services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finsight"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  market-data-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp-servers/market-data/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MCP_SKIP_PROVIDER_PROBE: "true"
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  news-macro-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp-servers/news-macro/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MCP_SKIP_PROVIDER_PROBE: "true"
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  rag-retrieval-mcp:
    build:
      context: .
      dockerfile: ./apps/mcp-servers/rag-retrieval/Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-watchdog:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "watchdog"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-brief:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "brief"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  celery-beat:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    command: ["celery", "-A", "api.lib.queues", "beat", "-l", "info"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-mission:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "mission"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-alert:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "alert"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  worker-screener:
    build:
      context: .
      dockerfile: ./apps/api-service/Dockerfile
    command: ["celery", "-A", "api.lib.queues", "worker", "-Q", "screener"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finsight
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  telegram-bot:
    build:
      context: ./apps/telegram-bot
    command: ["python", "-m", "telegram_bot.main"]
    profiles: ["telegram"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      FINSIGHT_API_BASE_URL: http://api:8000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  telegram-worker:
    build:
      context: ./apps/telegram-bot
    command: ["celery", "-A", "telegram_bot.notifier", "worker", "-Q", "telegram"]
    profiles: ["telegram"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      FINSIGHT_API_BASE_URL: http://api:8000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config/runtime:/app/config/runtime:ro

  dashboard:
    build:
      context: ./apps/dashboard
    command: ["python", "-m", "dashboard.main"]
    ports:
      - "8050:8050"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./config/runtime:/app/config/runtime:ro
volumes:
  pgdata:
