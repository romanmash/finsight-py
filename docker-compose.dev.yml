services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    volumes:
      - ./:/app
      - ./config/runtime:/app/config/runtime:ro
    command: ["sh", "-c", "sleep infinity"]

  agent-worker:
    volumes:
      - ./:/app
      - ./config/runtime:/app/config/runtime:ro
    command: ["sh", "-c", "sleep infinity"]
